<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Asphalt Neon Driving</title><style>body,html{margin:0;padding:0;width:100%;height:100%;background-color:#050510;overflow:hidden;font-family:'Courier New',Courier,monospace;touch-action:none;user-select:none}canvas{display:block;width:100%;height:100%}#ui{position:absolute;top:20px;left:20px;color:#0ff;text-shadow:0 0 10px #0ff;pointer-events:none;z-index:5}.hud-text{font-size:20px;margin:5px 0;font-weight:700}#pc-hint{position:absolute;top:80px;right:20px;color:#f0f;text-shadow:0 0 10px #f0f;pointer-events:none;font-size:14px;text-align:right;z-index:5}.touch-btn{position:absolute;width:70px;height:70px;background:rgba(0,255,255,.1);border:2px solid #0ff;border-radius:50%;display:flex;justify-content:center;align-items:center;color:#fff;font-size:24px;font-weight:700;z-index:10;box-shadow:0 0 15px #0ff inset,0 0 15px #0ff;transition:background .1s}.touch-btn:active{background:rgba(0,255,255,.5)}#btn-left{bottom:30px;left:20px}#btn-right{bottom:30px;left:110px}#btn-gas{bottom:30px;right:20px}#btn-brake{bottom:30px;right:110px;border-color:#f0f;background:rgba(255,0,255,.1);box-shadow:0 0 15px #f0f inset,0 0 15px #f0f}#btn-brake:active{background:rgba(255,0,255,.5)}.menu{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,5,16,.9);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:20}.menu.active{display:flex}.menu h1{color:#f0f;font-size:50px;text-shadow:0 0 20px #f0f;margin-bottom:20px;text-align:center}.menu h2{color:#0ff;font-size:30px;text-shadow:0 0 10px #0ff;margin-bottom:40px;text-align:center}.menu-btn{background:0 0;border:2px solid #0ff;color:#0ff;padding:15px 30px;font-size:24px;font-weight:700;margin:10px;cursor:pointer;text-shadow:0 0 10px #0ff;box-shadow:0 0 15px #0ff inset,0 0 15px #0ff;transition:.2s;font-family:inherit}.menu-btn:active{background:rgba(0,255,255,.3)}.pause-btn{position:absolute;top:20px;right:20px;width:50px;height:50px;background:rgba(0,255,255,.1);border:2px solid #0ff;border-radius:50%;color:#fff;font-size:20px;font-weight:700;z-index:15;display:none;justify-content:center;align-items:center;box-shadow:0 0 15px #0ff inset,0 0 15px #0ff;cursor:pointer}.pause-btn:active{background:rgba(0,255,255,.5)}@media(min-width:800px){.touch-btn{width:90px;height:90px;font-size:30px}#btn-left{left:40px;bottom:40px}#btn-right{left:150px;bottom:40px}#btn-gas{right:40px;bottom:40px}#btn-brake{right:150px;bottom:40px}}</style></head><body><div id="ui" style="display:none"><div class="hud-text" id="speedDisplay">SPEED: 0 KM/H</div><div class="hud-text" id="scoreDisplay">SCORE: 0</div></div><div id="pc-hint" style="display:none">PC: Arrow Keys<br>Mobile: Touch Buttons</div><div id="btn-left" class="touch-btn" style="display:none">◀</div><div id="btn-right" class="touch-btn" style="display:none">▶</div><div id="btn-brake" class="touch-btn" style="display:none">B</div><div id="btn-gas" class="touch-btn" style="display:none">A</div><div id="btn-pause" class="pause-btn" onclick="pauseGame()">||</div><div id="menus"><div id="titleScreen" class="menu active"><h1>ASPHALT NEON DRIVING</h1><button class="menu-btn" onclick="startGame()">PLAY GAME</button><button class="menu-btn" onclick="window.location.href='https://ravindra0105-1.github.io/Retro_Lite_Neon_Games/'">QUIT</button></div><div id="pauseScreen" class="menu"><h1>PAUSED</h1><button class="menu-btn" onclick="resumeGame()">RESUME</button><button class="menu-btn" onclick="toTitle()">QUIT TO TITLE</button></div><div id="gameOverScreen" class="menu"><h1>CRASHED!</h1><h2 id="finalScore"></h2><button class="menu-btn" onclick="startGame()">PLAY AGAIN</button><button class="menu-btn" onclick="toTitle()">QUIT TO TITLE</button></div><div id="countdownScreen" class="menu"><h1 id="cdText" style="font-size:120px;margin:0">3</h1></div></div><canvas id="gameCanvas"></canvas><script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');let cameraHeight=1000,gameState='TITLE',cdInt;function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;cameraHeight=canvas.width>canvas.height?1300:1000}window.addEventListener('resize',resizeCanvas);resizeCanvas();function toggleUI(s){document.getElementById('ui').style.display=s?'block':'none';document.getElementById('pc-hint').style.display=s?'block':'none';document.getElementById('btn-pause').style.display=s?'flex':'none';document.querySelectorAll('.touch-btn').forEach(b=>b.style.display=s?'flex':'none')}function startCountdown(){gameState='COUNTDOWN';toggleUI(!1);document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));let cds=document.getElementById('countdownScreen');cds.classList.add('active');let c=3;document.getElementById('cdText').innerText=c;clearInterval(cdInt);cdInt=setInterval(()=>{c--;if(c>0)document.getElementById('cdText').innerText=c;else{clearInterval(cdInt);cds.classList.remove('active');gameState='PLAY';toggleUI(!0)}},1000)}function startGame(){position=0;playerX=0;speed=0;carYaw=0;resetRoad();startCountdown()}function pauseGame(){if(gameState==='PLAY'){gameState='PAUSE';toggleUI(!1);document.getElementById('pauseScreen').classList.add('active')}}function resumeGame(){document.getElementById('pauseScreen').classList.remove('active');startCountdown()}function toTitle(){gameState='TITLE';document.querySelectorAll('.menu').forEach(m=>m.classList.remove('active'));document.getElementById('titleScreen').classList.add('active');toggleUI(!1)}const segmentLength=200,trackLength=4000,roadWidth=2000,cameraDepth=.84,drawDistance=320,segments=[],COLORS={dark:{road:'#111',grass:'#050510',rumble:'#f0f',lane:'#111'},light:{road:'#222',grass:'#0a0a1a',rumble:'#0ff',lane:'#0ff'}};let position=0,playerX=0,speed=0,carYaw=0;const maxSpeed=segmentLength*1.2,accel=maxSpeed/60,braking=-maxSpeed/30,decel=-maxSpeed/120,offRoadDecel=-maxSpeed/20,offRoadLimit=maxSpeed/4,centrifugal=.3,steeringAssist=.02,keys={ArrowUp:!1,ArrowDown:!1,ArrowLeft:!1,ArrowRight:!1};window.addEventListener('keydown',e=>{if(keys.hasOwnProperty(e.code))keys[e.code]=!0});window.addEventListener('keyup',e=>{if(keys.hasOwnProperty(e.code))keys[e.code]=!1});function bindTouch(id,k){const el=document.getElementById(id),p=e=>{e.preventDefault();keys[k]=!0},r=e=>{e.preventDefault();keys[k]=!1};['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,p));['touchend','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,r))}bindTouch('btn-gas','ArrowUp');bindTouch('btn-brake','ArrowDown');bindTouch('btn-left','ArrowLeft');bindTouch('btn-right','ArrowRight');function resetRoad(){segments.length=0;const RGB=['#ff0000','#00ff00','#0000ff','#00ffff','#ff00ff','#ffff00'],BLD=['#00ffff','#ff00ff','#ffff00','#ff0055','#5500ff'];for(let n=0;n<trackLength;n++){let c=0;if(n>100&&n<300)c=2;else if(n>400&&n<600)c=-3;else if(n>800&&n<1200)c=Math.sin(n/30)*4;else if(n>1500&&n<2000)c=1.5;let sc=[];if(Math.random()<.6)sc.push({type:'building',offset:-2.5-Math.random()*1.5,color:BLD[Math.floor(Math.random()*BLD.length)],hMult:1+Math.random()*3.5,seed:n});if(Math.random()<.6)sc.push({type:'building',offset:2.5+Math.random()*1.5,color:BLD[Math.floor(Math.random()*BLD.length)],hMult:1+Math.random()*3.5,seed:n+trackLength});if(Math.random()<.15)sc.push({type:'tree',offset:Math.random()>.5?1.3+Math.random()*.5:-1.3-Math.random()*.5,color:RGB[Math.floor(Math.random()*RGB.length)]});if(n>50&&Math.random()<.03)sc.push({type:'obs',offset:(Math.random()*1.6)-.8,color:'#fa0'});segments.push({index:n,curve:c,color:Math.floor(n/3)%2?COLORS.dark:COLORS.light,scenery:sc,sx:0,sy:0,sw:0})}}function drawPolygon(c,x1,y1,w1,x2,y2,w2,col){c.fillStyle=col;c.beginPath();c.moveTo(x1-w1,y1);c.lineTo(x2-w2,y2);c.lineTo(x2+w2,y2);c.lineTo(x1+w1,y1);c.fill()}function update(){let bs=segments[Math.floor(position/segmentLength)%segments.length],sp=speed/maxSpeed,dx=sp*.15;if(keys.ArrowUp)speed+=accel;else if(keys.ArrowDown)speed+=braking;else speed+=decel;if(keys.ArrowLeft)playerX-=dx;if(keys.ArrowRight)playerX+=dx;playerX-=dx*sp*bs.curve*centrifugal;playerX+=sp*bs.curve*steeringAssist;if(Math.abs(playerX)>1.2&&speed>offRoadLimit)speed+=offRoadDecel;if(Math.abs(playerX)>2.1&&gameState==='PLAY'){playerX=0;speed=0;carYaw=0;position=Math.max(0,position-segmentLength*4);startCountdown();return}playerX=Math.max(-2.5,Math.min(2.5,playerX));speed=Math.max(0,Math.min(maxSpeed,speed));position+=speed;if(position>=trackLength*segmentLength)position-=trackLength*segmentLength;let pI=Math.floor((position+segmentLength*.8)/segmentLength)%segments.length;if(segments[pI].scenery)segments[pI].scenery.forEach(s=>{if(s.type==='obs'&&Math.abs(playerX-s.offset)<.22){gameState='OVER';toggleUI(!1);document.getElementById('gameOverScreen').classList.add('active');document.getElementById('finalScore').innerText=`SCORE: ${Math.floor(position/100)}`}});carYaw+=((keys.ArrowLeft?-1:(keys.ArrowRight?1:0))-carYaw)*.15;document.getElementById('speedDisplay').innerText=`SPEED: ${Math.floor((speed/maxSpeed)*220)} KM/H`;document.getElementById('scoreDisplay').innerText=`SCORE: ${Math.floor(position/100)}`}function render(){ctx.clearRect(0,0,canvas.width,canvas.height);ctx.fillStyle='#050510';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.beginPath();ctx.arc(canvas.width/2,canvas.height/2.5,canvas.height/5,0,Math.PI*2);ctx.fillStyle='#f0f';ctx.shadowBlur=40;ctx.shadowColor='#f0f';ctx.fill();ctx.shadowBlur=0;let bi=Math.floor(position/segmentLength),pct=(position%segmentLength)/segmentLength,x=0,dx=-(segments[bi%segments.length].curve*pct),maxy=canvas.height,spt=[];for(let n=0;n<drawDistance;n++){let i=(bi+n)%segments.length,seg=segments[i],sc=cameraDepth/((n-pct+1)*segmentLength),pX=(x-playerX*roadWidth)*sc,pY=(-cameraHeight)*sc;seg.sx=(canvas.width/2)+(pX*canvas.width/2);seg.sy=(canvas.height/2)-(pY*canvas.height/2);seg.sw=roadWidth*sc*canvas.width/2;if(n<180&&seg.scenery)seg.scenery.forEach(s=>spt.push({type:s.type,x:seg.sx+(seg.sw*s.offset),y:seg.sy,w:seg.sw,h:seg.sw,color:s.color,hMult:s.hMult,seed:s.seed,clipY:maxy,dist:n}));x+=dx;dx+=seg.curve;if(n===0||seg.sy>=maxy)continue;maxy=seg.sy;let prev=segments[(bi+n-1)%segments.length];drawPolygon(ctx,canvas.width/2,prev.sy,canvas.width,canvas.width/2,seg.sy,canvas.width,seg.color.grass);if(n<100&&seg.color.rumble==='#0ff'){ctx.shadowBlur=15;ctx.shadowColor='#0ff'}drawPolygon(ctx,prev.sx,prev.sy,prev.sw*1.15,seg.sx,seg.sy,seg.sw*1.15,seg.color.rumble);ctx.shadowBlur=0;drawPolygon(ctx,prev.sx,prev.sy,prev.sw,seg.sx,seg.sy,seg.sw,seg.color.road);if(seg.color.lane)drawPolygon(ctx,prev.sx,prev.sy,prev.sw*.03,seg.sx,seg.sy,seg.sw*.03,seg.color.lane)}for(let i=spt.length-1;i>=0;i--){let sp=spt[i];if(sp.y>sp.clipY&&sp.dist>1)continue;if(sp.type==='tree'){let tw=sp.w*.5,th=sp.h*1.5;if(sp.y-th>canvas.height)continue;ctx.fillStyle=sp.color;if(sp.dist<80){ctx.shadowBlur=15;ctx.shadowColor=sp.color}if(sp.dist<120)ctx.fillRect(sp.x-(tw*.1),sp.y-th,tw*.2,th);ctx.beginPath();ctx.moveTo(sp.x,sp.y-th-tw);ctx.lineTo(sp.x-tw,sp.y-th*.3);ctx.lineTo(sp.x+tw,sp.y-th*.3);ctx.fill();ctx.shadowBlur=0}else if(sp.type==='obs'){let obW=sp.w*.4,obH=sp.h*.3;if(sp.y-obH>canvas.height)continue;ctx.fillStyle=sp.color;if(sp.dist<80){ctx.shadowBlur=15;ctx.shadowColor=sp.color}if(sp.dist<120){ctx.fillRect(sp.x-obW/2,sp.y-obH,obW,obH);ctx.fillStyle='#000';ctx.fillRect(sp.x-obW/4,sp.y-obH*.8,obW/2,obH*.6)}ctx.shadowBlur=0}else{let bw=sp.w*.75,bh=sp.h*sp.hMult,bx=sp.x-bw/2,by=sp.y-bh,sd=sp.x<(canvas.width/2)?1:-1,sw=bw*.4,so=sp.h*.15;if(by>canvas.height)continue;ctx.fillStyle='#020205';ctx.strokeStyle=sp.color;ctx.lineWidth=1+(sp.w/150);ctx.lineJoin='round';ctx.fillRect(bx,by,bw,bh);ctx.strokeRect(bx,by,bw,bh);if(sp.dist<120){ctx.beginPath();if(sd===1){ctx.moveTo(bx+bw,by);ctx.lineTo(bx+bw+sw,by-so);ctx.lineTo(bx+bw+sw,by+bh-so);ctx.lineTo(bx+bw,by+bh)}else{ctx.moveTo(bx,by);ctx.lineTo(bx-sw,by-so);ctx.lineTo(bx-sw,by+bh-so);ctx.lineTo(bx,by+bh)}ctx.fill();ctx.stroke()}if(sp.dist<80){ctx.fillStyle=sp.color;ctx.shadowBlur=10;ctx.shadowColor=sp.color;let cL=3,rW=Math.floor(sp.hMult*2.5),wW=bw/(cL*2.5),wH=bh/(rW*2);ctx.beginPath();for(let r=0;r<rW;r++)for(let c=0;c<cL;c++)if((r+c+sp.seed)%3!==0)ctx.rect(bx+(c*2.5+1)*(bw/(cL*2.5))-wW/2,by+(r*2+1)*(bh/(rW*2))-wH/2,wW,wH);ctx.fill();ctx.shadowBlur=0}}}let cw=canvas.width<600?100:160,ch=cw*.45,cy=canvas.height-(ch+(canvas.height>canvas.width?150:30)),t=-carYaw*.08-(segments[Math.floor(position/segmentLength)%segments.length].curve*.03);ctx.save();ctx.translate(canvas.width/2,cy+ch);ctx.rotate(t);let sW=Math.abs(carYaw)*cw*.15,bX=-cw/2+carYaw*cw*.05,ti=cw*.1;ctx.fillStyle='rgba(0,255,255,0.4)';ctx.shadowBlur=25;ctx.shadowColor='#0ff';ctx.beginPath();ctx.ellipse(bX+cw/2,-ch/4,cw*.8,ch*.6,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;let bg=ctx.createLinearGradient(0,-ch,0,0);bg.addColorStop(0,'#1a1a24');bg.addColorStop(1,'#3a3a4a');ctx.fillStyle='#111118';ctx.beginPath();if(carYaw<-.01){ctx.moveTo(bX+ti,-ch);ctx.lineTo(bX-sW+ti,-ch*.9);ctx.lineTo(bX-sW,0);ctx.lineTo(bX,0)}else if(carYaw>.01){ctx.moveTo(bX+cw-ti,-ch);ctx.lineTo(bX+cw+sW-ti,-ch*.9);ctx.lineTo(bX+cw+sW,0);ctx.lineTo(bX+cw,0)}ctx.fill();ctx.fillStyle=bg;ctx.beginPath();ctx.moveTo(bX+ti,-ch);ctx.lineTo(bX+cw-ti,-ch);ctx.lineTo(bX+cw,0);ctx.lineTo(bX,0);ctx.fill();ctx.strokeStyle='#0ff';ctx.lineWidth=2.5;ctx.shadowBlur=10;ctx.shadowColor='#0ff';ctx.beginPath();ctx.moveTo(bX,0);ctx.lineTo(bX+ti,-ch);ctx.lineTo(bX+cw-ti,-ch);ctx.lineTo(bX+cw,0);ctx.stroke();ctx.beginPath();ctx.moveTo(bX+cw/2,0);ctx.lineTo(bX+cw/2,-ch);ctx.stroke();ctx.shadowBlur=0;let gg=ctx.createLinearGradient(0,-ch*.9,0,-ch*.3);gg.addColorStop(0,'#000');gg.addColorStop(1,'#044');ctx.fillStyle=gg;ctx.beginPath();ctx.moveTo(bX+cw*.2,-ch*.85);ctx.lineTo(bX+cw*.8,-ch*.85);ctx.lineTo(bX+cw*.9,-ch*.35);ctx.lineTo(bX+cw*.1,-ch*.35);ctx.fill();ctx.strokeStyle='#111';ctx.lineWidth=2;for(let l=1;l<=4;l++){let ly=-ch*.85+(l*.1*ch);ctx.beginPath();ctx.moveTo(bX+cw*.2-(l*cw*.02),ly);ctx.lineTo(bX+cw*.8+(l*cw*.02),ly);ctx.stroke()}ctx.fillStyle='#1a1a24';ctx.fillRect(bX+cw*.25,-ch*1.15,cw*.08,ch*.3);ctx.fillRect(bX+cw*.67,-ch*1.15,cw*.08,ch*.3);ctx.fillStyle=bg;ctx.fillRect(bX-cw*.05,-ch*1.2,cw*1.1,ch*.18);ctx.fillStyle='#0ff';ctx.shadowBlur=12;ctx.shadowColor='#0ff';ctx.fillRect(bX-cw*.05,-ch*1.1,cw*1.1,ch*.04);ctx.shadowBlur=0;ctx.fillStyle='#0a0a10';ctx.fillRect(bX+cw*.05,-ch*.2,cw*.9,ch*.2);ctx.fillStyle=keys.ArrowDown?'#fff':'#ff0055';ctx.shadowColor=keys.ArrowDown?'#fff':'#ff0055';ctx.shadowBlur=keys.ArrowDown?25:15;ctx.fillRect(bX+cw*.08,-ch*.15,cw*.84,ch*.08);ctx.shadowBlur=0;ctx.fillStyle='#222';ctx.fillRect(bX+cw*.2,-ch*.05,cw*.15,ch*.08);ctx.fillRect(bX+cw*.65,-ch*.05,cw*.15,ch*.08);if(keys.ArrowUp){ctx.fillStyle='#0ff';ctx.shadowBlur=10;ctx.shadowColor='#0ff';ctx.fillRect(bX+cw*.22,-ch*.02,cw*.11,ch*.05);ctx.fillRect(bX+cw*.67,-ch*.02,cw*.11,ch*.05);ctx.shadowBlur=0}ctx.fillStyle='#000';ctx.fillRect(bX-ti,-ch*.2,ti,ch*.25);ctx.fillRect(bX+cw,-ch*.2,ti,ch*.25);ctx.fillStyle='#0ff';ctx.fillRect(bX-ti*.8,-ch*.1,ti*.6,ch*.08);ctx.fillRect(bX+cw+ti*.2,-ch*.1,ti*.6,ch*.08);ctx.restore()}function loop(){if(gameState==='PLAY')update();render();requestAnimationFrame(loop)}resetRoad();loop();
</script></body></html>
